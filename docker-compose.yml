version: '3.8'

services:
  # Main application
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/data/shadowrun.db
      - Redis__ConnectionString=redis:6379
      - Redis__InstanceName=Shadowrun:
      - Discord__Token=${DISCORD_TOKEN}
      - Cache__Enabled=true
      - Cache__ConnectionString=redis:6379
      - Cache__InstanceName=Shadowrun:
      - WebUI__Port=5000
      - WebUI__EnableSwagger=true
    volumes:
      - shadowrun_data:/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shadowrun_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - shadowrun_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: redis-server --appendonly yes

  # Optional: Admin UI for Redis (development only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - dev
    networks:
      - shadowrun_network

volumes:
  shadowrun_data:
  redis_data:

networks:
  shadowrun_network:
    driver: bridge
